services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      - LOG_DIR=/app/logs
    depends_on:
      - mlflow
    networks:
      - ml-network
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5001:5001"
    volumes:
      - ./mlruns:/app/mlruns
    networks:
      - ml-network
    restart: unless-stopped

networks:
  ml-network:
    driver: bridge
