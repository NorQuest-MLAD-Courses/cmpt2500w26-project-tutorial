global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "churn-api"
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ["api:5000"]

  - job_name: "model-training"
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8002"]
    scrape_timeout: 3s
